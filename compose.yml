services:
  app:
    build:
      context: .
      args:
        NUXT_SITE_URL: ${NUXT_SITE_URL:?Set NUXT_SITE_URL in .env.production}
        AI_GATEWAY_API_KEY: ${AI_GATEWAY_API_KEY:-}
        STUDIO_GITHUB_CLIENT_ID: ${STUDIO_GITHUB_CLIENT_ID:-}
        STUDIO_GITHUB_CLIENT_SECRET: ${STUDIO_GITHUB_CLIENT_SECRET:-}
    image: carbon-docus:latest
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
    expose:
      - "3000"

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      - app
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env.production}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
